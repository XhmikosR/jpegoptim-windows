name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_COLOR: 2

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: true
          # We need to get all git revisions for `git describe` to work
          fetch-depth: 0
          persist-credentials: false

      - name: Set up NASM
        uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2
        with:
          version: 3.01

      - name: Build
        run: CALL "build.bat"
        shell: cmd

      - name: Set version variable
        run: echo "JPEGOPTIM_VER=$(git describe --tags --long)" >> $GITHUB_ENV
        shell: bash

      - name: Prepare files
        run: |
          mkdir dist
          cp Release/x64/jpegoptim.exe src/jpegoptim/COPYRIGHT src/jpegoptim/LICENSE src/jpegoptim/README dist/
        shell: bash

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: "jpegoptim-${{ env.JPEGOPTIM_VER }}"
          path: dist/
          if-no-files-found: error
